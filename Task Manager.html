const uid = () => Math.random().toString(36).slice(2, 9);

// ── date helpers ──────────────────────────────────────────────
function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function parseKey(k) {
  const [y, m, d] = k.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function addDays(d, n) {
  const x = new Date(d);
  x.setDate(x.getDate() + n);
  return x;
}
const WD_SHORT = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const MON_SHORT = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const MON_LONG = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
function isSameDay(a, b) { return dateKey(a) === dateKey(b); }

// ── factories ─────────────────────────────────────────────────
function makeTask({ title, category = 'work', totalBoxes = 1, subtasks = [], fromTodoId, fromGroupId, fromGroupName, start = null, duration = 60 }) {
  return {
    id: uid(), title, category,
    completedCount: 0, totalBoxes,
    subtasks: subtasks.map(s => ({
      id: uid(), title: s.title, completedCount: 0, totalBoxes: s.totalBoxes || 1,
    })),
    isExpanded: false, fromTodoId, fromGroupId, fromGroupName,
    start, duration, // start = minutes from midnight (null = unscheduled); duration in minutes
  };
}

// minutes-from-midnight ↔ "9:30 AM" / "14:00"
function fmtTime(min) {
  if (min == null) return '';
  let h = Math.floor(min / 60), m = min % 60;
  const ap = h < 12 ? 'AM' : 'PM';
  let hh = h % 12; if (hh === 0) hh = 12;
  return `${hh}:${String(m).padStart(2, '0')} ${ap}`;
}
function fmtRange(start, duration) {
  if (start == null) return '';
  return `${fmtTime(start)} – ${fmtTime(Math.min(1440, start + (duration || 60)))}`;
}

// soft-deadline phrasing for a To-do due date (YYYY-MM-DD | null)
function dueInfo(due) {
  if (!due) return { label: null, tone: 'none', sort: Infinity };
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const d = parseKey(due); d.setHours(0, 0, 0, 0);
  const diff = Math.round((d - today) / 86400000);
  let label, tone;
  if (diff < 0) { label = diff === -1 ? '1 day overdue' : `${-diff} days overdue`; tone = 'over'; }
  else if (diff === 0) { label = 'Today'; tone = 'today'; }
  else if (diff === 1) { label = 'Tomorrow'; tone = 'soon'; }
  else if (diff <= 6) { label = `In ${diff} days`; tone = 'soon'; }
  else { label = `${MON_SHORT[d.getMonth()]} ${d.getDate()}`; tone = 'far'; }
  return { label, tone, sort: diff };
}

    events: [
      { id: uid(), title: 'Team stand-up', date: today, start: 600, duration: 30, color: '#e5484d', source: 'apple', cal: 'Work' },
      { id: uid(), title: 'Lunch with Sara', date: today, start: 750, duration: 60, color: '#0c8599', source: 'apple', cal: 'Personal' },
      { id: uid(), title: 'Client A — design sync', date: today, start: 900, duration: 60, color: '#e5484d', source: 'apple', cal: 'Work' },
      { id: uid(), title: 'Gym', date: today, start: 1140, duration: 60, color: '#0c8599', source: 'apple', cal: 'Personal' },
      { id: uid(), title: 'Dentist', date: tom, start: 540, duration: 45, color: '#e5484d', source: 'apple', cal: 'Personal' },
      { id: uid(), title: 'Sprint planning', date: tom, start: 660, duration: 90, color: '#e5484d', source: 'apple', cal: 'Work' },

const LS_KEY = 'taskmgr_v4';
function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  const s = seed();
  try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch (e) {}
  return s;
}

const StoreContext = React.createContext(null);

// ── cloud sync (Supabase) ─────────────────────────────────────
// Config is supplied by the host page as `window.KOTSU_SYNC = { url, anonKey, rowId }`.
// When it's absent/empty, the app runs exactly as before (localStorage only).
const SYNC_CFG = (typeof window !== 'undefined' && window.KOTSU_SYNC) || {};
const SYNC_ENABLED = !!(SYNC_CFG.url && SYNC_CFG.anonKey && typeof window !== 'undefined' && window.supabase);
const SYNC_ROW = SYNC_CFG.rowId || 'main';
const SYNC_TABLE = SYNC_CFG.table || 'app_state';
const REV_KEY = 'taskmgr_rev';
let _sbClient = null;
function sbClient() {
  if (!SYNC_ENABLED) return null;
  if (!_sbClient) _sbClient = window.supabase.createClient(SYNC_CFG.url, SYNC_CFG.anonKey);
  return _sbClient;
}

function useStoreProvider() {
  const [data, setData] = React.useState(load);
  // 'off' | 'connecting' | 'saving' | 'synced' | 'error'
  const [syncStatus, setSyncStatus] = React.useState(SYNC_ENABLED ? 'connecting' : 'off');
  const hydratedRef = React.useRef(!SYNC_ENABLED); // gate pushes until first pull resolves
  const applyingRemoteRef = React.useRef(false);   // skip the push triggered by an incoming pull
  const pushTimer = React.useRef(null);

  // pull from the cloud; remote is authoritative when it's newer than our local copy
  const pull = React.useCallback(async () => {
    if (!SYNC_ENABLED) return { ok: false, changed: false };
    setSyncStatus('connecting');
    let changed = false;
    try {
      const { data: row, error } = await sbClient()
        .from(SYNC_TABLE).select('data, updated_at').eq('id', SYNC_ROW).maybeSingle();
      if (error) throw error;
      if (row && row.data) {
        const localRev = Number(localStorage.getItem(REV_KEY) || 0);
        const remoteRev = new Date(row.updated_at).getTime();
        if (remoteRev > localRev) {
          applyingRemoteRef.current = true;
          setData(row.data);
          changed = true;
          try { localStorage.setItem(REV_KEY, String(remoteRev)); } catch (e) {}
        }
      }
      setSyncStatus('synced');
      return { ok: true, changed };
    } catch (e) {
      console.warn('[sync] pull failed', e && e.message);
      setSyncStatus('error');
      return { ok: false, changed: false };
    } finally {
      hydratedRef.current = true;
    }
  }, []);

  // initial pull on mount
  React.useEffect(() => { pull(); }, [pull]);

  // persist to localStorage always; debounce-push to the cloud once hydrated
  React.useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {}
    if (!SYNC_ENABLED || !hydratedRef.current) return;
    if (applyingRemoteRef.current) { applyingRemoteRef.current = false; return; }
    const rev = Date.now();
    try { localStorage.setItem(REV_KEY, String(rev)); } catch (e) {}
    setSyncStatus('saving');
    clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(async () => {
      try {
        const { error } = await sbClient()
          .from(SYNC_TABLE).upsert({ id: SYNC_ROW, data, updated_at: new Date(rev).toISOString() });
        if (error) throw error;
        setSyncStatus('synced');
      } catch (e) {
        console.warn('[sync] push failed', e && e.message);
        setSyncStatus('error');
      }
    }, 700);
  }, [data]);

  // mutate(draft => {...}) — clones, applies, sets
  const mutate = React.useCallback((fn) => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      fn(next);
      return next;
    });
  }, []);

  const actions = React.useMemo(() => ({
    dayTasks(key) { return (data.days[key] || []); },

    addTask(key, taskInput) {
      mutate(d => {
        if (!d.days[key]) d.days[key] = [];
        d.days[key].push(makeTask(taskInput));
      });
    },
    addTasksBulk(key, taskInputs) {
      mutate(d => {
        if (!d.days[key]) d.days[key] = [];
        taskInputs.forEach(t => d.days[key].push(makeTask(t)));
      });
    },
    updateTask(key, id, fn) {
      mutate(d => {
        const t = (d.days[key] || []).find(x => x.id === id);
        if (!t) return;
        fn(t);
        // once a To-do-sourced task is completed, drop it from the To-do list
        if (t.fromTodoId && t.totalBoxes > 0 && t.completedCount >= t.totalBoxes) {
          d.todos = (d.todos || []).filter(td => td.id !== t.fromTodoId);
        }
      });
    },
    deleteTask(key, id) {
      mutate(d => { d.days[key] = (d.days[key] || []).filter(x => x.id !== id); });
    },
    // remove every task that came from a given group from a day
    removeGroupTasks(key, gid) {
      mutate(d => { d.days[key] = (d.days[key] || []).filter(x => x.fromGroupId !== gid); });
    },
    // reorder the tasks whose ids appear in orderedIds, leaving any task not in
    // that list (e.g. filtered out by category) at its current array position
    reorderTasks(key, orderedIds) {
      mutate(d => {
        const arr = d.days[key] || [];
        const idSet = new Set(orderedIds);
        const byId = new Map(arr.map(t => [t.id, t]));
        const queue = orderedIds.map(id => byId.get(id)).filter(Boolean);
        let qi = 0;
        d.days[key] = arr.map(t => (idSet.has(t.id) ? queue[qi++] : t));
      });
    },
    resetDay(key) {
      mutate(d => {
        (d.days[key] || []).forEach(t => {
          t.completedCount = 0;
          t.subtasks.forEach(s => { s.completedCount = 0; });
        });
      });
    },
    // remove every task for a given day
    clearDay(key) {
      mutate(d => { d.days[key] = []; });
    },
    // place/unplace a task on the day timeline
    scheduleTask(key, id, start, duration) {
      mutate(d => {
        const t = (d.days[key] || []).find(x => x.id === id);
        if (!t) return;
        t.start = start;
        if (duration != null) t.duration = duration;
        else if (t.duration == null) t.duration = 60;
      });
    },
    unscheduleTask(key, id) {
      mutate(d => {
        const t = (d.days[key] || []).find(x => x.id === id);
        if (t) t.start = null;
      });
    },

    // calendar events
    addEvent(ev) { mutate(d => { if (!d.events) d.events = []; d.events.push({ id: uid(), source: 'local', color: '#e5484d', duration: 60, ...ev }); }); },
    updateEvent(id, patch) { mutate(d => { const i = (d.events || []).findIndex(e => e.id === id); if (i >= 0) d.events[i] = { ...d.events[i], ...patch }; }); },
    deleteEvent(id) { mutate(d => { d.events = (d.events || []).filter(e => e.id !== id); }); },

    // to-do backlog
    addTodo(t) { mutate(d => { d.todos.unshift({ ...t, id: uid(), createdAt: Date.now() }); }); },
    updateTodo(id, t) { mutate(d => { const i = d.todos.findIndex(x => x.id === id); if (i >= 0) d.todos[i] = { ...d.todos[i], ...t }; }); },
    deleteTodo(id) { mutate(d => { d.todos = d.todos.filter(x => x.id !== id); }); },
    // reorder the to-do backlog to match orderedIds
    reorderTodos(orderedIds) {
      mutate(d => {
        const byId = new Map((d.todos || []).map(t => [t.id, t]));
        d.todos = orderedIds.map(id => byId.get(id)).filter(Boolean);
      });
    },

    // groups
    addGroup(g) { mutate(d => { d.groups.unshift({ ...g, id: uid(), createdAt: Date.now() }); }); },
    updateGroup(id, g) { mutate(d => { const i = d.groups.findIndex(x => x.id === id); if (i >= 0) d.groups[i] = { ...d.groups[i], ...g }; }); },
    deleteGroup(id) { mutate(d => { d.groups = d.groups.filter(x => x.id !== id); }); },

    // categories
    addCategory(c) { mutate(d => { d.categories.push({ id: uid(), name: c.name, color: c.color }); }); },
    updateCategory(id, patch) { mutate(d => { const i = d.categories.findIndex(c => c.id === id); if (i >= 0) d.categories[i] = { ...d.categories[i], ...patch }; }); },
    moveCategory(id, dir) {
      mutate(d => {
        const i = d.categories.findIndex(c => c.id === id);
        const j = i + dir;
        if (i < 0 || j < 0 || j >= d.categories.length) return;
        const a = d.categories;
        [a[i], a[j]] = [a[j], a[i]];
      });
    },
    // delete a category, reassigning any tasks that referenced it to `fallbackId`
    deleteCategory(id, fallbackId) {
      mutate(d => {
        if (d.categories.length <= 1) return;
        const fb = fallbackId || (d.categories.find(c => c.id !== id) || {}).id;
        Object.values(d.days).forEach(arr => arr.forEach(t => { if (t.category === id) t.category = fb; }));
        d.groups.forEach(g => g.tasks.forEach(t => { if (t.category === id) t.category = fb; }));
        d.categories = d.categories.filter(c => c.id !== id);
      });
    },
  }), [data, mutate]);

  return { data, actions, syncStatus, syncEnabled: SYNC_ENABLED, refresh: pull };
}

// usage count for a category across all stored days
function categoryUsage(data, id) {
  let n = 0;
  Object.values(data.days || {}).forEach(arr => arr.forEach(t => { if (t.category === id) n++; }));
  return n;
}
function getCat(data, id) {

// ── Button ────────────────────────────────────────────────────
function Btn({ children, variant = 'primary', size = 'md', disabled, onClick, style, title, type }) {
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
    fontFamily: 'inherit', fontWeight: 600, cursor: disabled ? 'not-allowed' : 'pointer',
    border: '1px solid transparent', borderRadius: 999, whiteSpace: 'nowrap',
    transition: 'background .14s, border-color .14s, color .14s, opacity .14s',
    fontSize: size === 'sm' ? 12.5 : 13.5,
    padding: size === 'sm' ? '6px 12px' : '9px 16px',
    lineHeight: 1, letterSpacing: -0.1,
  };
  const variants = {
    primary: { background: 'var(--accent)', color: 'var(--on-accent)', opacity: disabled ? 0.4 : 1 },
    outline: { background: 'var(--bg)', color: 'var(--text)', borderColor: 'var(--border2)' },
    ghost: { background: 'transparent', color: 'var(--text2)' },
    accentGhost: { background: 'var(--accent-soft)', color: 'var(--accent)' },
  };
  return (
    <button type={type || 'button'} title={title} onClick={disabled ? undefined : onClick} disabled={disabled}
      className={'btn btn-' + variant}
      style={{ ...base, ...variants[variant], ...style }}>
      {children}
    </button>
  );
}

function CheckboxRow({ completedCount, totalBoxes, onChange, onAddBox, onRemoveBox, boxSize = 20, showCtrls = true }) {

  };
  return (
    <div className="cbrow" style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>

              style={{
                width: boxSize, height: boxSize, borderRadius: Math.max(4, boxSize * 0.28),
                border: '1.5px solid ' + (filled ? 'var(--accent)' : 'var(--border2)'),
                background: (filled && checkStyle === 'solid') ? 'var(--accent)' : 'var(--bg)',
                cursor: 'pointer', padding: 0, flexShrink: 0,
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',

              {filled && checkStyle === 'check' && (

const CATEGORY_COLORS = ['#2f6feb', '#0f9d6b', '#e8590c', '#7048e8', '#d6336c', '#0c8599', '#f08c00', '#5c6b7a'];

// long-press hook: fires after ~480ms hold; cancels on move/scroll/release
function useLongPress(onLongPress, onClick) {
  const timer = React.useRef(null);
  const fired = React.useRef(false);
  const start = React.useRef([0, 0]);
  const clear = () => { if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  const onDown = (e) => {
    fired.current = false;
    const p = e.touches ? e.touches[0] : e;
    start.current = [p.clientX, p.clientY];
    clear();
    timer.current = setTimeout(() => { fired.current = true; onLongPress && onLongPress(e); }, 480);
  };
  const onMove = (e) => {
    const p = e.touches ? e.touches[0] : e;
    if (Math.abs(p.clientX - start.current[0]) > 8 || Math.abs(p.clientY - start.current[1]) > 8) clear();
  };
  const onUp = (e) => {
    clear();
    if (!fired.current && onClick) onClick(e);
  };
  return {
    onMouseDown: onDown, onMouseMove: onMove, onMouseUp: onUp, onMouseLeave: clear,
    onTouchStart: onDown, onTouchMove: onMove, onTouchEnd: onUp,
    onContextMenu: (e) => { e.preventDefault(); onLongPress && onLongPress(e); },
  };
}

function ManageCategoriesSheet({ open, onClose }) {
  const { data, actions } = React.useContext(StoreContext);
  const [name, setName] = React.useState('');
  const [color, setColor] = React.useState(CATEGORY_COLORS[0]);

  React.useEffect(() => {
    if (open) {
      setName('');
      // pick a color not already used, if possible
      const used = new Set((data.categories || []).map(c => c.color));
      setColor(CATEGORY_COLORS.find(c => !used.has(c)) || CATEGORY_COLORS[0]);
    }
  }, [open]);

  const add = () => {
    const n = name.trim(); if (!n) return;
    actions.addCategory({ name: n, color });
    setName('');
    const used = new Set([...(data.categories || []).map(c => c.color), color]);
    setColor(CATEGORY_COLORS.find(c => !used.has(c)) || CATEGORY_COLORS[0]);
  };

  return (
    <Sheet open={open} onClose={onClose}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 18px 12px' }}>
        <span style={{ fontSize: 17, fontWeight: 700, letterSpacing: -0.3 }}>Categories</span>
        <IconBtn onClick={onClose} title="Close"><IconClose size={18} /></IconBtn>
      </div>

      <div style={{ overflow: 'auto', padding: '0 18px 18px', display: 'flex', flexDirection: 'column', gap: 14 }}>
        {/* add row */}
        <div style={{ border: '1px dashed var(--border2)', borderRadius: 12, padding: 12, background: 'var(--bg2)' }}>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <input value={name} onChange={e => setName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') add(); }}
              placeholder="New category" className="inp"
              style={{ flex: 1, fontSize: 14, fontWeight: 600, padding: '9px 11px', background: 'var(--bg)' }} />
            <Btn variant="primary" size="sm" onClick={add} disabled={!name.trim()}><IconPlus size={14} /> Add</Btn>
          </div>
          <div style={{ marginTop: 11 }}>
            <CategoryColorPicker value={color} size={22} onChange={setColor} />
          </div>
        </div>

        {/* list */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {data.categories.map((c, i) => (
            <CategoryRow key={c.id} cat={c} index={i} total={data.categories.length} />
          ))}
        </div>
      </div>
    </Sheet>
  );
}

function SubtaskRow({ sub, onChange, onDelete }) {

// ── Task card ─────────────────────────────────────────────────
function TaskCard({ task, dkey, actions, catColor, dragHandle, dragging, onEdit, onLongPress }) {
  const [addingSub, setAddingSub] = React.useState(false);
  const [subText, setSubText] = React.useState('');
  const done = task.totalBoxes > 0 && task.completedCount >= task.totalBoxes;
  // phone: long-press the title opens an action sheet (edit/delete) instead of inline buttons
  const lp = useLongPress(onLongPress ? () => onLongPress(task.id) : undefined);

  const upd = (fn) => actions.updateTask(dkey, task.id, fn);

  const submitSub = () => {
    const t = subText.trim();
    if (t) upd(tk => tk.subtasks.push({ id: uid(), title: t, completedCount: 0, totalBoxes: 1 }));
    setSubText(''); setAddingSub(false);
  };

  // category color shows on the card frame (instead of a dot) to save space;
  // completed tasks are filled with a muted gray so "done" reads at a glance
  const cardBorder = dragging ? 'var(--accent)' : (done ? '#d2d2d6' : (catColor || 'var(--border)'));
  const bw = (catColor && !done) ? 1.5 : 1;
  return (
    <div className="task-card" style={{
      background: done ? '#e7e7ea' : 'var(--bg)', borderRadius: 8, border: `${bw}px solid ${cardBorder}`,
      padding: '7px 12px', transition: 'background .18s, box-shadow .14s, border-color .14s',
      boxShadow: dragging ? '0 10px 24px rgba(0,0,0,0.14)' : 'none',
    }}>
      {/* main row */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        {dragHandle && (
          <span onPointerDown={dragHandle} title="Drag to reorder"
            style={{
              cursor: 'grab', color: 'var(--muted)', display: 'inline-flex', flexShrink: 0,
              touchAction: 'none', marginLeft: -4, marginRight: -2, padding: '2px 0',
            }}>
            <IconGrip size={16} />
          </span>
        )}
        <button type="button" onClick={() => upd(t => { t.isExpanded = !t.isExpanded; })}
          style={{
            border: 'none', background: 'transparent', cursor: 'pointer', padding: 2,
            color: 'var(--muted)', display: 'inline-flex', flexShrink: 0,
          }} title={task.isExpanded ? 'Collapse' : 'Expand'}>
          <IconChevron size={15} style={{ transform: task.isExpanded ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }} />
        </button>

        <span {...(onLongPress ? lp : {})} title={onLongPress ? 'Hold for options' : undefined}
          style={{
            flex: 1, minWidth: 0, fontSize: 13, fontWeight: 500, letterSpacing: -0.1,
            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            color: done ? 'var(--muted)' : 'inherit',
            textDecorationLine: done ? 'line-through' : 'none', textDecorationColor: 'var(--muted)',
            cursor: onLongPress ? 'pointer' : 'default',
            WebkitUserSelect: 'none', userSelect: 'none', WebkitTouchCallout: 'none',
          }}>
          {task.title}
        </span>

        <CheckboxRow
          completedCount={task.completedCount} totalBoxes={task.totalBoxes}
          onChange={(n) => upd(t => { t.completedCount = n; })}
          onAddBox={() => upd(t => { t.totalBoxes = Math.min(10, t.totalBoxes + 1); })}
          onRemoveBox={task.totalBoxes > 1 ? () => upd(t => { t.totalBoxes -= 1; t.completedCount = Math.min(t.completedCount, t.totalBoxes); }) : null}
        />

        {!onLongPress && (
          <>
            {onEdit && (
              <IconBtn className="del-btn" size={26} title="Edit task" onClick={() => onEdit(task.id)}>
                <IconPencil size={15} />
              </IconBtn>
            )}
            <IconBtn className="del-btn" size={26} danger title="Delete task"
              onClick={() => actions.deleteTask(dkey, task.id)}>
              <IconClose size={15} />
            </IconBtn>
          </>
        )}
      </div>

      {/* expanded */}
      {task.isExpanded && (
        <div style={{ marginTop: 8, paddingTop: 4, borderTop: '1px solid var(--border)' }}>
          {task.subtasks.map(s => (
            <SubtaskRow key={s.id} sub={s}
              onChange={(ns) => upd(t => { const i = t.subtasks.findIndex(x => x.id === s.id); if (i >= 0) t.subtasks[i] = ns; })}
              onDelete={() => upd(t => { t.subtasks = t.subtasks.filter(x => x.id !== s.id); })} />
          ))}
          {addingSub ? (
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', padding: '8px 0 4px 6px' }}>
              <input autoFocus value={subText} onChange={e => setSubText(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') submitSub(); if (e.key === 'Escape') { setAddingSub(false); setSubText(''); } }}
                onBlur={submitSub} placeholder="Subtask name"
                className="inp" style={{ flex: 1, fontSize: 12.5, padding: '6px 9px' }} />
            </div>
          ) : (
            <button type="button" onClick={() => setAddingSub(true)}
              style={{
                border: 'none', background: 'transparent', cursor: 'pointer', color: 'var(--text2)',
                fontFamily: 'inherit', fontSize: 12, fontWeight: 600, padding: '7px 0 3px 6px',
                display: 'inline-flex', alignItems: 'center', gap: 5,
              }}>
              <IconPlus size={13} /> Add subtask
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ── Calendar popover ──────────────────────────────────────────
function CalendarPopover({ selected, onSelect, onClose, recordKeys, popStyle }) {
  const [view, setView] = React.useState(() => { const d = parseKey(selected); return { y: d.getFullYear(), m: d.getMonth() }; });
  const todayKey = dateKey(new Date());

  const first = new Date(view.y, view.m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(view.y, view.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const shift = (n) => setView(v => { const d = new Date(v.y, v.m + n, 1); return { y: d.getFullYear(), m: d.getMonth() }; });

  return (
    <>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, zIndex: 140 }} />
      <div style={{
        position: 'absolute', top: '100%', left: '50%',
        marginLeft: -160, marginTop: 6, width: 320, zIndex: 150,
        background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 14,
        boxShadow: '0 12px 36px rgba(0,0,0,0.16)', padding: 14, ...popStyle,
      }}>
        {/* month nav */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <IconBtn onClick={() => shift(-1)} title="Previous month"><IconArrowLeft size={17} /></IconBtn>
          <span style={{ fontWeight: 700, fontSize: 14, letterSpacing: -0.2 }}>{MON_LONG[view.m]} {view.y}</span>
          <IconBtn onClick={() => shift(1)} title="Next month"><IconArrowRight size={17} /></IconBtn>
        </div>
        {/* dow row */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', marginBottom: 4 }}>
          {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map((w, i) => (
            <div key={i} style={{ textAlign: 'center', fontSize: 10.5, fontWeight: 600, color: 'var(--muted)', padding: '4px 0' }}>{w}</div>
          ))}
        </div>
        {/* day grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2 }}>
          {cells.map((d, i) => {
            if (d === null) return <div key={i} />;
            const k = dateKey(new Date(view.y, view.m, d));
            const isSel = k === selected, isToday = k === todayKey, hasRec = recordKeys.has(k);
            return (
              <button type="button" key={i} onClick={() => onSelect(k)}
                style={{
                  position: 'relative', aspectRatio: '1', border: 'none', cursor: 'pointer',
                  borderRadius: 8, fontFamily: 'inherit', fontSize: 13,

// ── Sortable task list (pointer-based drag to reorder) ────────
function SortableTaskList({ tasks, dkey, actions, isAll, data, onEditTask, onLongPressTask }) {
  const [order, setOrder] = React.useState(tasks);
  const [dragId, setDragId] = React.useState(null);
  // collapsed group ids persist across page changes and reloads
  const [collapsed, setCollapsed] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('taskmgr_collapsed') || '{}') || {}; } catch (e) { return {}; }
  });
  React.useEffect(() => { try { localStorage.setItem('taskmgr_collapsed', JSON.stringify(collapsed)); } catch (e) {} }, [collapsed]);
  const [confirmGroup, setConfirmGroup] = React.useState(null);
  const orderRef = React.useRef(tasks);
  const rowRefs = React.useRef(new Map());

  // resync from props whenever not mid-drag
  React.useEffect(() => {
    if (dragId == null) { orderRef.current = tasks; setOrder(tasks); }
  }, [tasks, dragId]);

  const setOrd = (next) => { orderRef.current = next; setOrder(next); };

  const startDrag = (id) => (e) => {
    e.preventDefault();
    setDragId(id);
    document.body.style.userSelect = 'none';
    const move = (ev) => {
      const y = ev.clientY;
      let targetId = null;
      for (const [rid, el] of rowRefs.current.entries()) {
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (y >= r.top && y <= r.bottom) { targetId = rid; break; }
      }
      if (targetId && targetId !== id) {
        const cur = orderRef.current;
        const from = cur.findIndex(t => t.id === id);
        const to = cur.findIndex(t => t.id === targetId);
        if (from >= 0 && to >= 0) {
          const a = [...cur];
          const [m] = a.splice(from, 1);
          a.splice(to, 0, m);
          setOrd(a);
        }
      }
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      document.body.style.userSelect = '';
      setDragId(null);
      actions.reorderTasks(dkey, orderRef.current.map(t => t.id));
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  // one draggable task row (ref tracked for pointer hit-testing)
  const taskRow = (t, plain) => (
    <div key={t.id}
      ref={el => { if (el) rowRefs.current.set(t.id, el); else rowRefs.current.delete(t.id); }}>
      <TaskCard task={t} dkey={dkey} actions={actions}
        catColor={plain ? null : getCat(data, t.category).color}
        dragHandle={startDrag(t.id)} dragging={dragId === t.id} onEdit={onEditTask} onLongPress={onLongPressTask} />
    </div>
  );

  // group consecutive tasks that came from the same group into a collapsible block
  const blocks = [];
  for (let i = 0; i < order.length;) {
    const t = order[i];
    if (t.fromGroupId) {
      const gid = t.fromGroupId, run = [];
      while (i < order.length && order[i].fromGroupId === gid) { run.push(order[i]); i++; }
      // prefer the name saved on the task; fall back to the live group, then a generic label
      const liveName = (data.groups || []).find(g => g.id === gid);
      const name = t.fromGroupName || (liveName && liveName.name) || 'Group';
      blocks.push({ type: 'group', gid, name, color: getCat(data, t.category).color, tasks: run });
    } else { blocks.push({ type: 'task', task: t }); i++; }
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      {blocks.map(b => {
        if (b.type === 'task') return taskRow(b.task, false);
        const isCollapsed = !!collapsed[b.gid];
        const doneCount = b.tasks.filter(t => t.totalBoxes > 0 && t.completedCount >= t.totalBoxes).length;
        return (
          <div key={'g:' + b.gid + ':' + b.tasks[0].id}
            style={{ border: `1.5px solid ${b.color}`, borderRadius: 10, background: 'var(--bg)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 8px 7px 11px' }}>
              <div onClick={() => setCollapsed(c => ({ ...c, [b.gid]: !c[b.gid] }))}
                style={{ display: 'flex', alignItems: 'center', gap: 8, flex: 1, minWidth: 0, cursor: 'pointer' }}>
                <IconChevron size={15} style={{ transform: isCollapsed ? 'none' : 'rotate(90deg)', transition: 'transform .15s', color: 'var(--muted)', flexShrink: 0 }} />
                <span style={{ width: 9, height: 9, borderRadius: 999, background: b.color, flexShrink: 0 }} />
                <span style={{ fontSize: 13.5, fontWeight: 700, letterSpacing: -0.2, color: 'var(--text)', flex: 1, textAlign: 'left', minWidth: 0, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{b.name}</span>
              </div>
              <span style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--text2)', flexShrink: 0, fontVariantNumeric: 'tabular-nums' }}>{doneCount}/{b.tasks.length}</span>
              <IconBtn size={26} danger title="Remove group from this day"
                onClick={() => setConfirmGroup({ gid: b.gid, name: b.name, n: b.tasks.length })}>
                <IconTrash size={15} />
              </IconBtn>
            </div>
            {!isCollapsed && (
              <div style={{ padding: '0 8px 8px', display: 'flex', flexDirection: 'column', gap: 6 }}>
                {b.tasks.map(t => taskRow(t, true))}
              </div>
            )}
          </div>
        );
      })}

      <ConfirmSheet open={!!confirmGroup} title="Remove group"
        message={confirmGroup ? `Remove “${confirmGroup.name}” and its ${confirmGroup.n} task${confirmGroup.n === 1 ? '' : 's'} from this day? The group itself is kept.` : ''}
        confirmLabel="Remove" onConfirm={() => { actions.removeGroupTasks(dkey, confirmGroup.gid); setConfirmGroup(null); }}
        onClose={() => setConfirmGroup(null)} />
    </div>
  );
}

// ===================== daytimeline.jsx =====================
// daytimeline.jsx — single-day hour-by-hour timeline (0–24h).
// Scheduled tasks + calendar events placed by time; drag to move, resize handle,
// tap to edit, unscheduled tray to drop tasks in. Exports: DayTimeline

const HOUR_PX = 58;
const SNAP = 15; // minutes
const DAY_MIN = 1440;

function snap(min) { return Math.max(0, Math.min(DAY_MIN, Math.round(min / SNAP) * SNAP)); }

// lay items into non-overlapping columns, clustered so width is only split
// among items that actually overlap (not across the whole day)
function packColumns(items) {
  const sorted = [...items].sort((a, b) => a.start - b.start || a.end - b.end);
  const layout = new Map();
  let i = 0;
  while (i < sorted.length) {
    // grow a cluster of transitively-overlapping items
    const cluster = [sorted[i]];
    let clusterEnd = sorted[i].end;
    let j = i + 1;
    while (j < sorted.length && sorted[j].start < clusterEnd) {
      cluster.push(sorted[j]);
      clusterEnd = Math.max(clusterEnd, sorted[j].end);
      j++;
    }
    // greedy column assignment within the cluster
    const cols = [];
    cluster.forEach(it => {
      let placed = false;
      for (let c = 0; c < cols.length; c++) {
        if (cols[c] <= it.start) { cols[c] = it.end; it._col = c; placed = true; break; }
      }
      if (!placed) { it._col = cols.length; cols.push(it.end); }
    });
    const total = cols.length;
    cluster.forEach(it => layout.set(it.key, { col: it._col, cols: total }));
    i = j;
  }
  return { layout };
}

function DayTimeline({ dkey, onEditEvent, onEditTask }) {
  const { data, actions } = React.useContext(StoreContext);
  const scrollRef = React.useRef(null);
  const laneRef = React.useRef(null);
  const [drag, setDrag] = React.useState(null); // {kind:'move'|'resize', id, type, offset, start, duration}

  const tasks = (data.days[dkey] || []);
  const events = (data.events || []).filter(e => e.date === dkey);
  const scheduled = tasks.filter(t => t.start != null);
  const unscheduled = tasks.filter(t => t.start == null);

  // scroll to ~7am on mount
  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = 7 * HOUR_PX - 10;
  }, [dkey]);

  // build blocks
  const blocks = [
    ...events.map(e => ({ key: 'e' + e.id, id: e.id, type: 'event', title: e.title,
      start: e.start, end: Math.min(DAY_MIN, e.start + (e.duration || 60)), duration: e.duration || 60,
      color: e.color || '#e5484d', source: e.source, sub: e.cal })),
    ...scheduled.map(t => { const cat = getCat(data, t.category);
      const dur = t.duration || 60;
      return { key: 't' + t.id, id: t.id, type: 'task', title: t.title,
        start: t.start, end: Math.min(DAY_MIN, t.start + dur), duration: dur,
        color: cat.color, done: t.completedCount >= t.totalBoxes && t.totalBoxes > 0 }; }),
  ];
  const { layout } = packColumns(blocks.map(b => ({ key: b.key, start: b.start, end: b.end })));

  // live drag override
  const livePos = (b) => {
    if (drag && drag.id === b.id && drag.type === b.type) {
      return { start: drag.start, duration: drag.duration };
    }
    return { start: b.start, duration: b.duration };
  };

  const onPointerDownBlock = (e, b, kind) => {
    e.stopPropagation();
    const laneRect = laneRef.current.getBoundingClientRect();
    const y = e.clientY - laneRect.top;
    const blockTop = (b.start / 60) * HOUR_PX;
    setDrag({ kind, id: b.id, type: b.type, grabOffset: y - blockTop, start: b.start, duration: b.duration, moved: false });
    try { e.target.setPointerCapture(e.pointerId); } catch (err) {}
  };

  const onPointerMove = (e) => {
    if (!drag) return;
    const laneRect = laneRef.current.getBoundingClientRect();
    const y = e.clientY - laneRect.top + (scrollRef.current ? 0 : 0);
    if (drag.kind === 'move') {
      let newStart = snap(((y - drag.grabOffset) / HOUR_PX) * 60);
      newStart = Math.max(0, Math.min(DAY_MIN - drag.duration, newStart));
      setDrag(d => ({ ...d, start: newStart, moved: true }));
    } else {
      let newDur = snap(((y) / HOUR_PX) * 60 - drag.start);
      newDur = Math.max(SNAP, Math.min(DAY_MIN - drag.start, newDur));
      setDrag(d => ({ ...d, duration: newDur, moved: true }));
    }
  };

  const commitDrag = (e) => {
    if (!drag) return;
    const d = drag;
    setDrag(null);
    if (!d.moved) {
      // treat as tap → edit
      if (d.type === 'event') onEditEvent && onEditEvent(d.id);
      else onEditTask && onEditTask(d.id);
      return;
    }
    if (d.type === 'event') actions.updateEvent(d.id, { start: d.start, duration: d.duration });
    else actions.scheduleTask(dkey, d.id, d.start, d.duration);
  };

  // drop an unscheduled task: place at 9:00 or first open-ish hour
  const scheduleFromTray = (taskId) => {
    actions.scheduleTask(dkey, taskId, 9 * 60, 60);
  };

  const hours = Array.from({ length: 25 }, (_, i) => i);
  const nowMin = (() => {
    const n = new Date();
    return (dkey === dateKey(n)) ? n.getHours() * 60 + n.getMinutes() : null;
  })();

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>
      {/* unscheduled tray */}
      {unscheduled.length > 0 && (
        <div style={{ flexShrink: 0, padding: '10px 14px', borderBottom: '1px solid var(--border)', background: 'var(--bg2)' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: 0.4, marginBottom: 8 }}>
            Unscheduled · {unscheduled.length}
          </div>
          <div className="scrollarea" style={{ display: 'flex', gap: 8, overflowX: 'auto' }}>
            {unscheduled.map(t => {
              const cat = getCat(data, t.category);
              return (
                <button type="button" key={t.id} onClick={() => scheduleFromTray(t.id)}
                  title="Tap to place at 9:00, then drag"
                  style={{
                    flexShrink: 0, display: 'inline-flex', alignItems: 'center', gap: 7, cursor: 'pointer',
                    border: '1px solid var(--border)', background: 'var(--bg)', borderRadius: 999,
                    padding: '7px 12px', fontFamily: 'inherit', fontSize: 12.5, fontWeight: 600, color: 'var(--text)',
                  }}>
                  <span style={{ width: 8, height: 8, borderRadius: 999, background: cat.color, flexShrink: 0 }} />
                  <span style={{ maxWidth: 150, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{t.title}</span>
                  <IconPlus size={13} style={{ color: 'var(--muted)' }} />
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* timeline scroll */}
      <div ref={scrollRef} className="scrollarea" style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', minHeight: 0 }}>
        <div ref={laneRef} style={{ position: 'relative', height: HOUR_PX * 24, marginLeft: 52 }}
          onPointerMove={onPointerMove} onPointerUp={commitDrag} onPointerCancel={commitDrag}>
          {/* hour lines + labels */}
          {hours.map(h => (
            <div key={h} style={{ position: 'absolute', top: h * HOUR_PX, left: 0, right: 0, height: 0 }}>
              <div style={{ position: 'absolute', left: -52, top: -7, width: 46, textAlign: 'right',
                fontSize: 10.5, color: 'var(--muted)', fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>
                {h === 0 || h === 24 ? '' : (h < 12 ? `${h} AM` : h === 12 ? '12 PM' : `${h - 12} PM`)}
              </div>
              <div style={{ position: 'absolute', left: 0, right: 8, top: 0, borderTop: '1px solid var(--border)' }} />
            </div>
          ))}

          {/* now indicator */}
          {nowMin != null && (
            <div style={{ position: 'absolute', top: (nowMin / 60) * HOUR_PX, left: 0, right: 8, zIndex: 6, pointerEvents: 'none' }}>
              <div style={{ position: 'absolute', left: -4, top: -4, width: 8, height: 8, borderRadius: 999, background: 'var(--accent)' }} />
              <div style={{ borderTop: '2px solid var(--accent)' }} />
            </div>
          )}

          {/* blocks */}
          {blocks.map(b => {
            const pos = livePos(b);
            const lay = layout.get(b.key) || { col: 0, cols: 1 };
            const top = (pos.start / 60) * HOUR_PX;
            const height = Math.max(20, (pos.duration / 60) * HOUR_PX - 3);
            const isDragging = drag && drag.id === b.id && drag.type === b.type;
            const isEvent = b.type === 'event';
            return (
              <div key={b.key}
                onPointerDown={(e) => onPointerDownBlock(e, b, 'move')}
                style={{
                  position: 'absolute', top, height,
                  left: `calc(${(lay.col / lay.cols) * 100}% + 2px)`,
                  width: `calc(${(1 / lay.cols) * 100}% - 10px)`,
                  borderRadius: 7, padding: '5px 8px', cursor: 'grab', touchAction: 'none',
                  zIndex: isDragging ? 20 : 8, overflow: 'hidden',
                  background: isEvent ? `color-mix(in srgb, ${b.color} 15%, #fff)` : b.color,
                  border: isEvent ? `1px solid color-mix(in srgb, ${b.color} 45%, #fff)` : 'none',
                  borderLeft: isEvent ? `3px solid ${b.color}` : 'none',
                  color: isEvent ? 'var(--text)' : '#fff',
                  opacity: b.done ? 0.5 : 1,
                  boxShadow: isDragging ? '0 8px 24px rgba(0,0,0,0.22)' : 'none',
                  userSelect: 'none',
                }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                  {isEvent && <IconCalendar size={11} style={{ color: b.color, flexShrink: 0 }} />}
                  <span style={{ fontSize: 12, fontWeight: 600, letterSpacing: -0.1, whiteSpace: 'nowrap',
                    overflow: 'hidden', textOverflow: 'ellipsis', textDecoration: b.done ? 'line-through' : 'none' }}>{b.title}</span>
                </div>
                {height > 30 && (
                  <div style={{ fontSize: 10.5, marginTop: 1, opacity: isEvent ? 0.7 : 0.85, fontVariantNumeric: 'tabular-nums' }}>
                    {fmtRange(pos.start, pos.duration)}
                  </div>
                )}
                {/* resize handle */}
                <div onPointerDown={(e) => onPointerDownBlock(e, b, 'resize')}
                  style={{ position: 'absolute', left: 0, right: 0, bottom: 0, height: 12, cursor: 'ns-resize', touchAction: 'none' }}>
                  <div style={{ position: 'absolute', bottom: 3, left: '50%', transform: 'translateX(-50%)',
                    width: 22, height: 3, borderRadius: 9, background: isEvent ? b.color : 'rgba(255,255,255,0.7)', opacity: 0.7 }} />
                </div>
              </div>
            );
          })}

          {blocks.length === 0 && (
            <div style={{ position: 'absolute', top: 8 * HOUR_PX, left: 0, right: 8, textAlign: 'center', color: 'var(--muted)', fontSize: 12.5 }}>
              Nothing scheduled. Tap a task in the tray, or use “+ Event”.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── small time stepper ────────────────────────────────────────
function TimeStepper({ label, minutes, onChange, step = 15, min = 0, max = 1440, fmt }) {
  const dec = () => onChange(Math.max(min, minutes - step));
  const inc = () => onChange(Math.min(max, minutes + step));
  const sbtn = (icon, fn) => (
    <button type="button" onClick={fn} style={{
      width: 32, height: 32, borderRadius: 8, border: '1px solid var(--border)', background: 'var(--bg)',
      color: 'var(--text)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
    }}>{icon}</button>
  );
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text2)' }}>{label}</span>
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
        {sbtn(<IconMinus size={15} />, dec)}
        <span style={{ minWidth: 92, textAlign: 'center', fontWeight: 600, fontSize: 14, fontVariantNumeric: 'tabular-nums' }}>
          {fmt ? fmt(minutes) : fmtTime(minutes)}
        </span>
        {sbtn(<IconPlus size={15} />, inc)}
      </div>
    </div>
  );
}

const EV_COLORS = ['#e5484d', '#2f6feb', '#0f9d6b', '#e8590c', '#7048e8', '#0c8599', '#f08c00', '#5c6b7a'];

// ── event editor sheet (add / edit / delete) ──────────────────
function EventEditorSheet({ open, eventId, dkey, onClose }) {
  const { data, actions } = React.useContext(StoreContext);
  const editing = eventId && eventId !== 'new'
    ? (data.events || []).find(e => e.id === eventId) : null;
  const [title, setTitle] = React.useState('');
  const [start, setStart] = React.useState(540);
  const [duration, setDuration] = React.useState(60);
  const [color, setColor] = React.useState(EV_COLORS[0]);

  React.useEffect(() => {
    if (!open) return;
    if (editing) { setTitle(editing.title); setStart(editing.start); setDuration(editing.duration || 60); setColor(editing.color || EV_COLORS[0]); }
    else { setTitle(''); setStart(540); setDuration(60); setColor(EV_COLORS[0]); }
  }, [open, eventId]);

  const save = () => {
    const n = title.trim(); if (!n) return;
    if (editing) actions.updateEvent(editing.id, { title: n, start, duration, color });
    else actions.addEvent({ title: n, date: dkey, start, duration, color, source: 'local' });
    onClose();
  };

  return (
    <Sheet open={open} onClose={onClose} maxWidth={460}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 18px 12px' }}>

        <IconBtn onClick={onClose} title="Close"><IconClose size={18} /></IconBtn>
      </div>
      <div style={{ overflow: 'auto', padding: '0 18px 18px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        {editing && editing.source === 'apple' && (
          <div style={{ display: 'inline-flex', alignSelf: 'flex-start', alignItems: 'center', gap: 6, fontSize: 11.5, fontWeight: 600,
            color: 'var(--text2)', background: 'var(--bg3)', padding: '4px 9px', borderRadius: 999 }}>
            <IconCalendar size={12} /> From Apple Calendar{editing.cal ? ` · ${editing.cal}` : ''}
          </div>
        )}
        <input autoFocus={!editing} value={title} onChange={e => setTitle(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') save(); }} placeholder="Event title"
          className="inp" style={{ width: '100%', fontSize: 15, fontWeight: 600, padding: '11px 13px' }} />
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <TimeStepper label="Starts" minutes={start} onChange={(v) => setStart(Math.min(v, DAY_MIN - SNAP))} />
          <TimeStepper label="Duration" minutes={duration} onChange={setDuration} min={15} max={DAY_MIN}

        </div>
        <div>

              }} />

// ── month grid ────────────────────────────────────────────────
function MonthGrid({ viewDate, dkey, onPick }) {
  const { data } = React.useContext(StoreContext);
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  const todayKey = dateKey(new Date());
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const dotsFor = (k) => {
    const cols = [];
    (data.events || []).forEach(e => { if (e.date === k) cols.push(e.color || '#e5484d'); });
    (data.days[k] || []).forEach(t => cols.push(getCat(data, t.category).color));
    return cols.slice(0, 4);
  };

  return (
    <div style={{ padding: '4px 12px 16px' }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', marginBottom: 4 }}>
        {WD_MIN.map((w, i) => (
          <div key={i} style={{ textAlign: 'center', fontSize: 10.5, fontWeight: 700, color: 'var(--muted)', padding: '4px 0' }}>{w}</div>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 3 }}>
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const k = dateKey(new Date(y, m, d));
          const isToday = k === todayKey, isSel = k === dkey;
          const dots = dotsFor(k);
          return (
            <button type="button" key={i} onClick={() => onPick(k)}
              style={{
                aspectRatio: '0.82', border: '1px solid ' + (isSel ? 'var(--accent)' : 'transparent'),
                background: isSel ? 'var(--accent-soft)' : 'transparent', cursor: 'pointer',
                borderRadius: 9, padding: '5px 0 0', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              }}>
              <span style={{
                width: 24, height: 24, borderRadius: 999, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 12.5, fontWeight: isToday ? 700 : 500, fontVariantNumeric: 'tabular-nums',
                background: isToday ? 'var(--accent)' : 'transparent', color: isToday ? 'var(--on-accent)' : 'var(--text)',
              }}>{d}</span>
              <div style={{ display: 'flex', gap: 2, flexWrap: 'wrap', justifyContent: 'center', maxWidth: 30 }}>
                {dots.map((c, j) => <span key={j} style={{ width: 4, height: 4, borderRadius: 999, background: c }} />)}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

  const base = new Date(viewDate); base.setDate(base.getDate() - base.getDay());
  const days = Array.from({ length: 7 }, (_, i) => addDays(base, i));

  React.useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 7 * WK_HOUR; }, []);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>

        <div />
        {days.map((d, i) => {
          const k = dateKey(d), isToday = k === todayKey, isSel = k === dkey;
          return (
            <button type="button" key={i} onClick={() => onOpenDay(k)}
              style={{ border: 'none', background: 'transparent', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, padding: '2px 0' }}>

              <span style={{
                width: 22, height: 22, borderRadius: 999, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 12, fontWeight: 700, fontVariantNumeric: 'tabular-nums',
                background: isToday ? 'var(--accent)' : (isSel ? 'var(--accent-soft)' : 'transparent'),
                color: isToday ? 'var(--on-accent)' : 'var(--text)',
              }}>{d.getDate()}</span>
            </button>
          );
        })}
      </div>

      {/* scrollable grid */}
      <div ref={scrollRef} className="scrollarea" style={{ flex: 1, overflowY: 'auto', minHeight: 0 }}>
        <div style={{ position: 'relative', height: WK_HOUR * 24, display: 'grid', gridTemplateColumns: '28px repeat(7,1fr)' }}>
          {/* hour labels col */}
          <div style={{ position: 'relative' }}>
            {Array.from({ length: 24 }, (_, h) => (
              <div key={h} style={{ position: 'absolute', top: h * WK_HOUR - 6, right: 4, fontSize: 8.5, color: 'var(--muted)', fontWeight: 600 }}>
                {h === 0 ? '' : (h < 12 ? h + 'a' : h === 12 ? '12p' : (h - 12) + 'p')}
              </div>
            ))}
          </div>
          {/* day columns */}
          {days.map((d, di) => {
            const k = dateKey(d);
            const evs = (data.events || []).filter(e => e.date === k).map(e => ({ ...e, color: e.color, isEvent: true }));
            const tks = (data.days[k] || []).filter(t => t.start != null).map(t => ({ start: t.start, duration: t.duration || 60, color: getCat(data, t.category).color, title: t.title }));
            const items = [...evs, ...tks];
            return (
              <div key={di} onClick={() => onPick(k)} style={{ position: 'relative', borderLeft: '1px solid var(--border)' }}>
                {Array.from({ length: 24 }, (_, h) => (
                  <div key={h} style={{ position: 'absolute', top: h * WK_HOUR, left: 0, right: 0, borderTop: '1px solid var(--border)', opacity: 0.5 }} />
                ))}
                {items.map((it, ii) => (
                  <div key={ii} style={{
                    position: 'absolute', top: (it.start / 60) * WK_HOUR, height: Math.max(8, (it.duration / 60) * WK_HOUR - 2),
                    left: 1, right: 1, borderRadius: 3, background: it.isEvent ? `color-mix(in srgb, ${it.color} 22%, #fff)` : it.color,
                    borderLeft: `2px solid ${it.color}`, overflow: 'hidden',
                  }} />
                ))}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// addtask.jsx — AddTaskModal (bottom sheet) + ApplyGroupSheet
// Exports to window: AddTaskModal, ApplyGroupSheet

function FieldLabel({ children }) {
  return <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: 0.4, marginBottom: 8 }}>{children}</div>;
}

function AddTaskModal({ open, onClose, dkey, defaultCat, editId }) {
  const { data, actions } = React.useContext(StoreContext);
  const cats = data.categories || [];
  const editing = editId ? (data.days[dkey] || []).find(t => t.id === editId) : null;
  const initialCat = defaultCat || defaultCategoryId(data);
  const [title, setTitle] = React.useState('');
  const [cat, setCat] = React.useState(initialCat);
  const [boxes, setBoxes] = React.useState(1);
  const [subs, setSubs] = React.useState([]);
  const [usedTodo, setUsedTodo] = React.useState(null);

  React.useEffect(() => {
    if (!open) return;
    if (editing) {
      setTitle(editing.title); setCat(editing.category); setBoxes(editing.totalBoxes);
      setSubs((editing.subtasks || []).map(s => ({ id: s.id, title: s.title, totalBoxes: s.totalBoxes })));
      setUsedTodo(null);
    } else {
      setTitle(''); setCat(defaultCat || defaultCategoryId(data)); setBoxes(1); setSubs([]); setUsedTodo(null);
    }
  }, [open, editId, defaultCat]);

  const fillFromTodo = (td) => {
    setTitle(td.title); setUsedTodo(td.id);
    if (td.category) setCat(td.category);
    if ((td.subtasks || []).length) setSubs(td.subtasks.map(s => ({ id: uid(), title: s.title, totalBoxes: s.totalBoxes || 1 })));
  };

  const addSub = () => setSubs(s => [...s, { id: uid(), title: '', totalBoxes: 1 }]);
  const setSub = (id, t) => setSubs(s => s.map(x => x.id === id ? { ...x, title: t } : x));
  const delSub = (id) => setSubs(s => s.filter(x => x.id !== id));

  const submit = () => {
    const name = title.trim();
    if (!name) return;
    const cleanSubs = subs.filter(s => s.title.trim());
    if (editing) {
      // edit existing task in place, preserving per-box / subtask progress
      actions.updateTask(dkey, editId, t => {
        t.title = name; t.category = cat; t.totalBoxes = boxes;
        if (t.completedCount > boxes) t.completedCount = boxes;
        const prevById = new Map((t.subtasks || []).map(s => [s.id, s]));
        t.subtasks = cleanSubs.map(s => {
          const tb = s.totalBoxes || 1;
          const prev = prevById.get(s.id);
          return { id: s.id || uid(), title: s.title.trim(), totalBoxes: tb,
            completedCount: prev ? Math.min(prev.completedCount, tb) : 0 };
        });

// upcoming Saturday from today
function nextWeekendKey() {
  const d = new Date(); d.setHours(0, 0, 0, 0);
  const delta = (6 - d.getDay() + 7) % 7 || 7; // next Sat (never today)
  return dateKey(addDays(d, delta));
}

const DUE_TONES = {
  over: { background: '#fdecec', color: '#e5484d' },
  today: { background: 'var(--accent-soft)', color: 'var(--accent)' },
  soon: { background: 'var(--bg3)', color: 'var(--text2)' },
  far: { background: 'var(--bg3)', color: 'var(--text2)' },
};

function DuePill({ due }) {
  const info = dueInfo(due);
  if (!info.label) return <span style={{ fontSize: 11.5, color: 'var(--muted)', fontWeight: 600 }}>No date</span>;
  const tone = DUE_TONES[info.tone] || DUE_TONES.soon;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5, ...tone,
      fontSize: 11.5, fontWeight: 600, padding: '3px 9px', borderRadius: 999,
      fontVariantNumeric: 'tabular-nums',

// ── Sortable to-do list (pointer-based drag to reorder) ───────
// columns > 1 renders a grid; hit-testing checks both axes so it works either way.
function SortableTodoList({ todos, actions, todayKey, addedSet, dkey, toast, mode, onEdit, onCancelEdit, onSaveEdit, columns = 1 }) {
  const [order, setOrder] = React.useState(todos);
  const [dragId, setDragId] = React.useState(null);
  const orderRef = React.useRef(todos);
  const rowRefs = React.useRef(new Map());

  React.useEffect(() => {
    if (dragId == null) { orderRef.current = todos; setOrder(todos); }
  }, [todos, dragId]);

  const setOrd = (next) => { orderRef.current = next; setOrder(next); };

  const startDrag = (id) => (e) => {
    e.preventDefault();
    setDragId(id);
    document.body.style.userSelect = 'none';
    const move = (ev) => {
      const x = ev.clientX, y = ev.clientY;
      let targetId = null;
      for (const [rid, el] of rowRefs.current.entries()) {
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) { targetId = rid; break; }
      }
      if (targetId && targetId !== id) {
        const cur = orderRef.current;
        const from = cur.findIndex(t => t.id === id);
        const to = cur.findIndex(t => t.id === targetId);
        if (from >= 0 && to >= 0) {
          const a = [...cur];
          const [m] = a.splice(from, 1);
          a.splice(to, 0, m);
          setOrd(a);
        }
      }
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      document.body.style.userSelect = '';
      setDragId(null);
      actions.reorderTodos(orderRef.current.map(t => t.id));
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  const containerStyle = columns > 1
    ? { display: 'grid', gridTemplateColumns: `repeat(${columns}, minmax(0, 1fr))`, gap: 12, alignItems: 'start' }
    : { display: 'flex', flexDirection: 'column', gap: 8 };

  return (
    <div style={containerStyle}>
      {order.map(t => (
        <div key={t.id}
          ref={el => { if (el) rowRefs.current.set(t.id, el); else rowRefs.current.delete(t.id); }}>
          {mode && mode.id === t.id ? (
            <TodoForm initial={t} onCancel={onCancelEdit} onSave={(nt) => onSaveEdit(t.id, nt)} />
          ) : (
            <TodoCard todo={t} dkey={dkey} todayKey={todayKey}
              addedToday={addedSet.has(t.id)} toast={toast} onEdit={onEdit}
              dragHandle={startDrag(t.id)} dragging={dragId === t.id} />
          )}
        </div>
      ))}
    </div>
  );
}

function TodoPage({ page, setPage, dkey, toast }) {
  const { data, actions } = React.useContext(StoreContext);
  const [mode, setMode] = React.useState(null); // null | 'new' | todo
  const todayKey = dateKey(new Date());

  // manual order: respect the stored backlog order (drag to reorder)
  const todos = data.todos || [];

  // which todos already have an incomplete task on today's list
  const addedSet = React.useMemo(() => {
    const s = new Set();
    (data.days[todayKey] || []).forEach(t => {
      if (t.fromTodoId && t.completedCount < t.totalBoxes) s.add(t.fromTodoId);
    });
    return s;
  }, [data.days, todayKey]);

  return (
    <div>
      <StickyHeader>
        <AppHeader page={page} setPage={setPage} actions={
          <Btn variant="primary" size="sm" onClick={() => setMode('new')}><IconPlus size={15} /> New</Btn>
        } />

        <div style={{ fontSize: 12.5, color: 'var(--text2)', padding: '0 2px 2px' }}>

        </div>

        {mode === 'new' && (
          <TodoForm onCancel={() => setMode(null)} onSave={(t) => { actions.addTodo(t); setMode(null); toast('Added to To-do'); }} />
        )}

        {todos.length === 0 && mode !== 'new' ? (
          <EmptyState mark={<MarkProjects size={66} />} title="Nothing on the list"
            sub="Jot down errands and one-offs you need to get to — like returning a package."
            cta={<Btn variant="primary" onClick={() => setMode('new')}><IconPlus size={15} /> Add a to-do</Btn>} />
        ) : (
          <SortableTodoList todos={todos} actions={actions} todayKey={todayKey}
            addedSet={addedSet} dkey={dkey} toast={toast} mode={mode}
            onEdit={(td) => setMode(td)}

  );
}

            subtasks: (t.subtasks || []).map(s => ({ title: s.title, totalBoxes: s.totalBoxes || 1 })), fromGroupId: g.id, fromGroupName: g.name })));

// ── Full-page editor ──────────────────────────────────────────
function GroupEditor({ initial, onCancel, onSave }) {
  const cats = React.useContext(StoreContext).data.categories || [];
  const fallbackCat = (cats[0] || { id: 'work' }).id;
  const [name, setName] = React.useState(initial?.name || '');
  // a group has a single category (picked by color); every task inherits it
  const [category, setCategory] = React.useState(
    initial?.category || (initial?.tasks && initial.tasks[0] && initial.tasks[0].category) || fallbackCat
  );
  const [tasks, setTasks] = React.useState(
    (initial?.tasks || []).map(t => ({ id: uid(), title: t.title, totalBoxes: t.totalBoxes || 1,
      subtasks: (t.subtasks || []).map(s => ({ id: uid(), title: s.title, totalBoxes: s.totalBoxes || 1 })) }))
  );

  const addTask = () => setTasks(ts => [...ts, { id: uid(), title: '', totalBoxes: 1, subtasks: [] }]);
  const patch = (id, p) => setTasks(ts => ts.map(t => t.id === id ? { ...t, ...p } : t));
  const del = (id) => setTasks(ts => ts.filter(t => t.id !== id));
  const move = (i, dir) => setTasks(ts => {
    const j = i + dir; if (j < 0 || j >= ts.length) return ts;
    const c = [...ts]; [c[i], c[j]] = [c[j], c[i]]; return c;
  });
  // per-task subtasks
  const addSub = (tid) => setTasks(ts => ts.map(t => t.id === tid ? { ...t, subtasks: [...(t.subtasks || []), { id: uid(), title: '', totalBoxes: 1 }] } : t));
  const setSub = (tid, sid, title) => setTasks(ts => ts.map(t => t.id === tid ? { ...t, subtasks: t.subtasks.map(s => s.id === sid ? { ...s, title } : s) } : t));
  const delSub = (tid, sid) => setTasks(ts => ts.map(t => t.id === tid ? { ...t, subtasks: t.subtasks.filter(s => s.id !== sid) } : t));
  const save = () => {
    const nm = name.trim(); if (!nm) return;
    onSave({ name: nm, category, tasks: tasks.filter(t => t.title.trim()).map(t => ({ id: uid(), title: t.title.trim(), category, totalBoxes: t.totalBoxes,
      subtasks: (t.subtasks || []).filter(s => s.title.trim()).map(s => ({ title: s.title.trim(), totalBoxes: s.totalBoxes || 1 })) })) });
  };

  return (
    <div>
      <StickyHeader>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 12px 12px', gap: 8 }}>
          <Btn variant="ghost" size="sm" onClick={onCancel}>Cancel</Btn>
          <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: -0.2 }}>{initial ? 'Edit group' : 'New group'}</span>
          <Btn variant="primary" size="sm" onClick={save} disabled={!name.trim()}>Save</Btn>
        </div>
      </StickyHeader>

      <div style={{ padding: '14px 14px 40px', display: 'flex', flexDirection: 'column', gap: 14 }}>
        <input autoFocus value={name} onChange={e => setName(e.target.value)} placeholder="Group name"
          className="inp" style={{ width: '100%', fontSize: 16, fontWeight: 700, padding: '11px 13px' }} />

        <div>
          <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--text2)', marginBottom: 9 }}>Category</div>
          <CategoryPills categories={cats} value={category} onChange={setCategory} />
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {tasks.map((t, i) => (
            <div key={t.id} style={{ border: '1px solid var(--border)', borderRadius: 10, padding: '8px 10px 10px 6px', display: 'flex', gap: 8, alignItems: 'flex-start' }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 1, paddingTop: 2 }}>
                <IconBtn size={22} onClick={() => move(i, -1)} title="Move up" style={{ opacity: i === 0 ? 0.3 : 1 }}><IconCaretUp size={15} /></IconBtn>
                <IconBtn size={22} onClick={() => move(i, 1)} title="Move down" style={{ opacity: i === tasks.length - 1 ? 0.3 : 1 }}><IconCaretDown size={15} /></IconBtn>
              </div>
              <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 8 }}>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <input value={t.title} onChange={e => patch(t.id, { title: e.target.value })} placeholder="Task name"
                    className="inp" style={{ flex: 1, minWidth: 0, fontSize: 13.5, padding: '9px 10px' }} />
                  <Counter value={t.totalBoxes} onChange={(v) => patch(t.id, { totalBoxes: v })} min={1} max={10} />
                  <IconBtn danger size={26} onClick={() => del(t.id)} title="Remove task"><IconClose size={16} /></IconBtn>
                </div>
                {/* subtasks */}
                {(t.subtasks || []).map(s => (
                  <div key={s.id} style={{ display: 'flex', gap: 8, alignItems: 'center', paddingLeft: 10 }}>
                    <span style={{ width: 12, height: 1.5, background: 'var(--border2)', flexShrink: 0, borderRadius: 2 }} />
                    <input value={s.title} onChange={e => setSub(t.id, s.id, e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') addSub(t.id); }} placeholder="Subtask"
                      className="inp" style={{ flex: 1, minWidth: 0, fontSize: 12.5, padding: '7px 9px' }} />
                    <IconBtn danger size={24} onClick={() => delSub(t.id, s.id)} title="Remove subtask"><IconClose size={14} /></IconBtn>
                  </div>
                ))}
                <button type="button" onClick={() => addSub(t.id)}
                  style={{
                    alignSelf: 'flex-start', marginLeft: 10, border: 'none', background: 'transparent',
                    cursor: 'pointer', color: 'var(--text2)', fontFamily: 'inherit', fontSize: 12, fontWeight: 600,
                    padding: '2px 0', display: 'inline-flex', alignItems: 'center', gap: 5,
                  }}>
                  <IconPlus size={13} /> Add subtask
                </button>
              </div>
            </div>
          ))}
          <button type="button" onClick={addTask} className="dashed-add"><IconPlus size={15} /> Add task to group</button>
        </div>
      </div>
    </div>
  );
}

function GroupsPage({ page, setPage, dkey, toast }) {
  const { data, actions } = React.useContext(StoreContext);

    return <GroupEditor initial={editing} onCancel={() => setEditing(null)} onSave={(g) => { actions.updateGroup(editing.id, g); setEditing(null); toast('Group updated'); }} />;

  return (
    <div>
      <StickyHeader>
        <AppHeader page={page} setPage={setPage} actions={
          <Btn variant="primary" size="sm" onClick={() => setEditing('new')}><IconPlus size={15} /> New</Btn>

// ── To-do (grid) ──────────────────────────────────────────────
function DesktopTodo({ device, dkey, toast }) {
  const { data, actions } = React.useContext(StoreContext);
  const [mode, setMode] = React.useState(null);
  const todayKey = dateKey(new Date());

  // manual order: respect the stored backlog order (drag to reorder)
  const todos = data.todos || [];

  const addedSet = React.useMemo(() => {
    const s = new Set();
    (data.days[todayKey] || []).forEach(t => { if (t.fromTodoId && t.completedCount < t.totalBoxes) s.add(t.fromTodoId); });
    return s;
  }, [data.days, todayKey]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>
      <DTPageHead title="To-do" sub="Things to do soon — drag the handle to reorder."
        actions={<Btn variant="primary" size="md" onClick={() => setMode('new')}><IconPlus size={15} /> New to-do</Btn>} />
      <div className="dt-scroll" style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: '20px 26px 30px' }}>
        {mode === 'new' && (
          <div style={{ maxWidth: 460, marginBottom: 18 }}>
            <TodoForm onCancel={() => setMode(null)} onSave={(t) => { actions.addTodo(t); setMode(null); toast('Added to To-do'); }} />

          <EmptyState mark={<MarkProjects size={66} />} title="Nothing on the list"

            cta={<Btn variant="primary" onClick={() => setMode('new')}><IconPlus size={15} /> Add a to-do</Btn>} />
        ) : (
          <div style={{ maxWidth: 720 }}>
            <SortableTodoList todos={todos} actions={actions} todayKey={todayKey}
              addedSet={addedSet} dkey={dkey} toast={toast} mode={mode} columns={1}
              onEdit={(td) => setMode(td)}
              onCancelEdit={() => setMode(null)}

  );
}

function DesktopGroups({ device, dkey, toast }) {
  const { data, actions } = React.useContext(StoreContext);
  const [editing, setEditing] = React.useState(null);

  if (editing === 'new')
    return <div style={{ height: '100%', overflowY: 'auto' }} className="dt-scroll"><div style={{ maxWidth: 620, margin: '0 auto' }}><GroupEditor onCancel={() => setEditing(null)} onSave={(g) => { actions.addGroup(g); setEditing(null); toast('Group saved'); }} /></div></div>;
  if (editing && typeof editing === 'object')
    return <div style={{ height: '100%', overflowY: 'auto' }} className="dt-scroll"><div style={{ maxWidth: 620, margin: '0 auto' }}><GroupEditor initial={editing} onCancel={() => setEditing(null)} onSave={(g) => { actions.updateGroup(editing.id, g); setEditing(null); toast('Group updated'); }} /></div></div>;

  const cols = device === 'laptop' ? 3 : 2;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>
      <DTPageHead title="Groups" sub="Bundles of tasks you can add to a day all at once."
        actions={<Btn variant="primary" size="md" onClick={() => setEditing('new')}><IconPlus size={15} /> New group</Btn>} />
      <div className="dt-scroll" style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: '20px 26px 30px' }}>
        {data.groups.length === 0 ? (
          <EmptyState mark={<MarkGroups size={66} />} title="No groups yet"
            sub="Bundle related tasks — like a morning routine — and add them together."
            cta={<Btn variant="primary" onClick={() => setEditing('new')}><IconPlus size={15} /> New group</Btn>} />
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))`, gap: 12, alignItems: 'start' }}>
            {data.groups.map(g => <GroupCard key={g.id} g={g} dkey={dkey} toast={toast} onEdit={(gr) => setEditing(gr)} />)}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Calendar (full width) ─────────────────────────────────────
function DesktopCalendar({ device, dkey, setDkey, viewMonth, setViewMonth, onEditEvent, onEditTask, onNewEvent }) {
  const [view, setView] = React.useState('month');
  const d = parseKey(dkey);
  const title = view === 'month'
    ? `${MON_LONG[viewMonth.getMonth()]} ${viewMonth.getFullYear()}`
    : view === 'week'
      ? `${MON_SHORT[viewMonth.getMonth()]} ${viewMonth.getFullYear()}`
      : `${WD_SHORT[d.getDay()]}, ${MON_LONG[d.getMonth()]} ${d.getDate()}`;
  const shift = (n) => {
    if (view === 'month') setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + n, 1));
    else if (view === 'week') setViewMonth(addDays(viewMonth, n * 7));
    else setDkey(dateKey(addDays(d, n)));
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, padding: '16px 26px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <span style={{ fontSize: 22, fontWeight: 700, letterSpacing: -0.5, minWidth: device === 'laptop' ? 230 : 180 }}>{title}</span>
          <div style={{ display: 'flex', gap: 4 }}>
            <IconBtn size={34} onClick={() => shift(-1)} title="Previous" style={{ border: '1px solid var(--border)' }}><IconArrowLeft size={17} /></IconBtn>
            <IconBtn size={34} onClick={() => shift(1)} title="Next" style={{ border: '1px solid var(--border)' }}><IconArrowRight size={17} /></IconBtn>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ display: 'flex', background: 'var(--bg3)', borderRadius: 9, padding: 3, gap: 3 }}>
            {[['month', 'Month'], ['week', 'Week'], ['day', 'Day']].map(([k, label]) => {
              const active = view === k;
              return (
                <button type="button" key={k} onClick={() => setView(k)} style={{
                  border: 'none', cursor: 'pointer', borderRadius: 7, padding: '7px 16px',
                  fontFamily: 'inherit', fontSize: 13, fontWeight: 600,
                  background: active ? 'var(--bg)' : 'transparent', color: active ? 'var(--text)' : 'var(--text2)',
                  boxShadow: active ? '0 1px 2px rgba(0,0,0,0.08)' : 'none',
                }}>{label}</button>
              );
            })}
          </div>
          <Btn variant="primary" size="md" onClick={onNewEvent}><IconPlus size={15} /> Event</Btn>
        </div>
      </div>
      <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>
        {view === 'month' && (
          <div className="dt-scroll dt-cal-month" style={{ flex: 1, minHeight: 0, overflowY: 'auto' }}>
            <MonthGrid viewDate={viewMonth} dkey={dkey} onPick={(k) => { setDkey(k); setView('day'); }} />
          </div>
        )}
        {view === 'week' && (
          <WeekView viewDate={viewMonth} dkey={dkey} onPick={(k) => setDkey(k)} onOpenDay={(k) => { setDkey(k); setView('day'); }} />
        )}
        {view === 'day' && (
          <div style={{ flex: 1, minHeight: 0, maxWidth: 760, width: '100%', margin: '0 auto' }}>
            <DayTimeline dkey={dkey} onEditEvent={onEditEvent} onEditTask={onEditTask} />
          </div>
        )}
      </div>
    </div>
  );
}

// ── Shell ─────────────────────────────────────────────────────
function DesktopApp({ device, page, setPage, dkey, setDkey, toast }) {
  const { data, actions } = React.useContext(StoreContext);
  const [cat, setCat] = React.useState('all');
  const [addOpen, setAddOpen] = React.useState(false);
  const [addCat, setAddCat] = React.useState(null);
  const [editId, setEditId] = React.useState(null);
  const [applyOpen, setApplyOpen] = React.useState(false);
  const [manageOpen, setManageOpen] = React.useState(false);
  const [evSheet, setEvSheet] = React.useState(null);
  const [taskSheet, setTaskSheet] = React.useState(null);
  const [viewMonth, setViewMonth] = React.useState(() => parseKey(dkey));

  React.useEffect(() => { setViewMonth(parseKey(dkey)); }, [dkey]);

  const all = data.days[dkey] || [];
  const counts = React.useMemo(() => {
    const m = {};
    all.forEach(t => { m[t.category] = (m[t.category] || 0) + 1; });
    return m;
  }, [all]);
  const recordKeys = React.useMemo(
    () => new Set(Object.keys(data.days).filter(k => (data.days[k] || []).length > 0)),
    [data.days]);

  return (
    <div style={{ position: 'relative', height: '100%', overflow: 'hidden', background: 'var(--bg)', display: 'flex' }}>
      <DesktopSidebar device={device} page={page} setPage={setPage} cat={cat} setCat={setCat}
        dkey={dkey} setDkey={setDkey} counts={counts} totalToday={all.length}
        onManage={() => setManageOpen(true)} viewMonth={viewMonth} setViewMonth={setViewMonth} />

      <div style={{ flex: 1, minWidth: 0, height: '100%' }}>
        {page === 'tasks' && (
          <DesktopTasks device={device} dkey={dkey} setDkey={setDkey} cat={cat} setCat={setCat} recordKeys={recordKeys}
            onAdd={(c) => { setAddCat(c || null); setAddOpen(true); }}
            onApplyGroup={() => setApplyOpen(true)} onManage={() => setManageOpen(true)}
            onResetDay={() => actions.resetDay(dkey)}
            onEditEvent={(id) => setEvSheet(id)} onEditTask={(id) => setTaskSheet(id)} onEditCard={(id) => setEditId(id)} onNewEvent={() => setEvSheet('new')} />
        )}
        {page === 'todo' && <DesktopTodo device={device} dkey={dkey} toast={toast} />}
        {page === 'calendar' && (
          <DesktopCalendar device={device} dkey={dkey} setDkey={setDkey} viewMonth={viewMonth} setViewMonth={setViewMonth}
            onEditEvent={(id) => setEvSheet(id)} onEditTask={(id) => setTaskSheet(id)} onNewEvent={() => setEvSheet('new')} />
        )}
        {page === 'groups' && <DesktopGroups device={device} dkey={dkey} toast={toast} />}
      </div>

      <AddTaskModal open={addOpen} onClose={() => setAddOpen(false)} dkey={dkey} defaultCat={addCat} />
      <AddTaskModal open={!!editId} editId={editId} onClose={() => setEditId(null)} dkey={dkey} />
      <ApplyGroupSheet open={applyOpen} onClose={() => setApplyOpen(false)} dkey={dkey} />
      <ManageCategoriesSheet open={manageOpen} onClose={() => setManageOpen(false)} />
      <EventEditorSheet open={!!evSheet} eventId={evSheet} dkey={dkey} onClose={() => setEvSheet(null)} />
      <TaskTimeSheet open={!!taskSheet} taskId={taskSheet} dkey={dkey} onClose={() => setTaskSheet(null)} />
    </div>
  );
}

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
